<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموسوعة الحديثية - الإصدار المتقدم</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1c4b44">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./style.css">
    
    <meta name="description" content="تطبيق متقدم للبحث في الموسوعة الحديثية بميزات المفضلة، سجل البحث وتخصيص المظهر.">
</head>
<body class="font-size-md theme-auto">
    <div class="app-container">
        
        <!-- Top Navigation -->
        <nav class="top-nav" aria-label="القائمة العلوية">
            <button id="btn-home" class="nav-btn active" aria-label="الرئيسية">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="sr-only">الرئيسية</span>
            </button>
            <button id="btn-favorites" class="nav-btn" aria-label="المفضلة">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <span class="sr-only">المفضلة</span>
            </button>
            <button id="btn-settings" class="nav-btn" aria-label="الإعدادات">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="sr-only">الإعدادات</span>
            </button>
        </nav>

        <!-- Header Section -->
        <header role="banner" class="header">
            <h1 id="app-title">الموسوعة الحديثية</h1>
            <p class="subtitle" id="app-description">ابحث في أحاديث الدرر السنية بسهولة</p>
        </header>

        <!-- Main Content Section -->
        <main role="main" class="main-content">
            
            <div id="view-search">
                <!-- Search Section -->
                <section class="search-section" aria-labelledby="search-heading">
                    <h2 id="search-heading" class="sr-only">نافذة البحث</h2>
                    
                    <form id="search-form" class="search-form" role="search" aria-label="البحث في الأحاديث">
                        <div class="input-group">
                            <label for="search-input" class="sr-only">أدخل كلمة البحث</label>
                            <input 
                                type="search" 
                                id="search-input" 
                                name="skey" 
                                placeholder="ابحث هنا (مثال: صلاة، صوم...)" 
                                required 
                                aria-required="true"
                                autocomplete="off"
                            >
                            <button type="submit" id="search-button" aria-label="ابحث">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <span class="sr-only">ابحث</span>
                            </button>
                        </div>
                        
                        <!-- Search History Dropdown -->
                        <div id="search-history" class="search-history hidden" aria-live="polite">
                            <!-- History items will be injected here -->
                        </div>
                    </form>
                    
                    <!-- Filters -->
                    <div class="filters-container">
                        <span class="filter-label" id="filter-label">تصفية:</span>
                        <div class="filter-buttons" role="group" aria-labelledby="filter-label">
                            <button class="filter-btn active" data-filter="all">الكل</button>
                            <button class="filter-btn" data-filter="authentic">الصحيح</button>
                            <button class="filter-btn" data-filter="weak">الضعيف</button>
                        </div>
                    </div>
                </section>

                <!-- Loading Indicator -->
                <div id="loading-indicator" class="loading-indicator hidden" aria-hidden="true" role="status" aria-live="polite">
                    <div class="spinner"></div>
                    <span class="sr-only">جاري البحث، يرجى الانتظار...</span>
                </div>

                <!-- Results Section -->
                <section id="results-section" class="results-section" aria-live="polite" aria-atomic="true" role="region" aria-labelledby="results-heading">
                    <h2 id="results-heading" class="sr-only">نتائج البحث</h2>
                    <div id="results-container">
                        <!-- Results will be injected here -->
                    </div>
                </section>
            </div>

            <div id="view-favorites" class="hidden">
                <h2>الأحاديث المفضلة</h2>
                <div id="favorites-container" class="results-section" aria-live="polite">
                    <!-- Favorites will be injected here -->
                </div>
            </div>

        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="settings-title">الإعدادات</h2>
                <button id="btn-close-settings" class="close-btn" aria-label="إغلاق">&times;</button>
            </div>
            <div class="modal-body">
                
                <div class="setting-group">
                    <label for="theme-select">المظهر (الوضع الليلي):</label>
                    <select id="theme-select" class="form-control">
                        <option value="auto">تلقائي (حسب النظام)</option>
                        <option value="light">فاتح</option>
                        <option value="dark">داكن</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="fontsize-select">حجم الخط:</label>
                    <select id="fontsize-select" class="form-control">
                        <option value="sm">صغير</option>
                        <option value="md" selected>متوسط</option>
                        <option value="lg">كبير</option>
                        <option value="xl">كبير جداً</option>
                    </select>
                </div>
                
                <div class="keyboard-shortcuts-info">
                    <strong>اختصارات لوحة المفاتيح:</strong>
                    <ul>
                        <li><code>/</code> أو <code>Ctrl+F</code> : البحث السريع</li>
                        <li><code>Esc</code> : إغلاق النوافذ</li>
                    </ul>
                </div>

            </div>
        </div>
    </div>

    <!-- Script file -->
    <script src="./script.js"></script>
</body>
</html>
