name: Build Apps

on:
  workflow_dispatch:

jobs:
  build-electron:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build Electron App
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows Exe
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: release/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Prepare Web Assets
      run: |
        mkdir -p www/assets/databases
        cp index.html style.css script.js manifest.json sw.js www/
        cp local_hadith.db www/assets/databases/ || true

    - name: Sync Capacitor Android
      run: |
        npx cap add android || true
        sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>' android/app/src/main/AndroidManifest.xml
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-App
        path: android/app/build/outputs/apk/debug/*.apk
